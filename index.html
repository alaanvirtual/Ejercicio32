<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 5 - Calificación con Letra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fff0f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .badge {
      display: inline-block;
      background: #fbeaf0;
      color: #993556;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h1 { font-size: 1.3rem; font-weight: 600; color: #2e001a; margin-bottom: 6px; }
    p { font-size: 13px; color: #777; margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      font-size: 15px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; outline: none;
      transition: border-color 0.2s; color: #2e001a;
    }
    input:focus { border-color: #d4537e; }
    button {
      margin-top: 16px; width: 100%;
      padding: 11px; font-size: 15px; font-weight: 600;
      background: #993556; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #b8406a; }
    button:active { transform: scale(0.98); }
    .result {
      margin-top: 16px;
      display: none;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
    }
    .letra {
      font-size: 72px; font-weight: 800;
      line-height: 1; margin-bottom: 8px;
    }
    .desc { font-size: 14px; font-weight: 500; }
    .escala {
      margin-top: 20px; display: grid;
      grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    .nivel {
      text-align: center; padding: 8px 4px;
      border-radius: 8px; font-size: 12px;
      border: 1.5px solid transparent;
      opacity: 0.45; transition: opacity 0.3s;
    }
    .nivel.activo { opacity: 1; border-color: currentColor; }
    .nivel-a { background: #eaf3de; color: #3b6d11; }
    .nivel-b { background: #e6f1fb; color: #185fa5; }
    .nivel-c { background: #faeeda; color: #854f0b; }
    .nivel-d { background: #fbeaf0; color: #993556; }
    .nivel-f { background: #fcebeb; color: #a32d2d; }
    .nivel .n { font-size: 20px; font-weight: 700; display: block; }
    .nivel .rango { font-size: 10px; }
    /* colores del resultado según letra */
    .bg-a { background: #eaf3de; color: #27500a; }
    .bg-b { background: #e6f1fb; color: #0c447c; }
    .bg-c { background: #faeeda; color: #633806; }
    .bg-d { background: #fbeaf0; color: #72243e; }
    .bg-f { background: #fcebeb; color: #791f1f; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Ejercicio 5</span>
    <h1>Calificación con Letra</h1>
    <p>Ingresa una puntuación del 0 al 100 y obtén su calificación en letra.</p>
    <label for="score">Puntuación (0 – 100)</label>
    <input type="number" id="score" placeholder="Ej: 85" min="0" max="100" />
    <button onclick="calificar()">Calificar</button>

    <div class="result" id="resultado">
      <div class="letra" id="letra"></div>
      <div class="desc" id="desc"></div>
    </div>

    <div class="escala">
      <div class="nivel nivel-a" id="nA"><span class="n">A</span><span class="rango">90–100</span></div>
      <div class="nivel nivel-b" id="nB"><span class="n">B</span><span class="rango">80–89</span></div>
      <div class="nivel nivel-c" id="nC"><span class="n">C</span><span class="rango">70–79</span></div>
      <div class="nivel nivel-d" id="nD"><span class="n">D</span><span class="rango">60–69</span></div>
      <div class="nivel nivel-f" id="nF"><span class="n">F</span><span class="rango">0–59</span></div>
    </div>
  </div>

  <script>
    function calificar() {
      const score = parseInt(document.getElementById('score').value);
      const res = document.getElementById('resultado');
      const letraEl = document.getElementById('letra');
      const descEl = document.getElementById('desc');

      ['nA','nB','nC','nD','nF'].forEach(id => {
        document.getElementById(id).classList.remove('activo');
      });

      if (isNaN(score) || score < 0 || score > 100) {
        alert('Ingresa una puntuación válida entre 0 y 100.');
        return;
      }

      let letra, descripcion, claseRes, idActivo;

      if (score >= 90) {
        letra = 'A'; descripcion = 'Excelente'; claseRes = 'bg-a'; idActivo = 'nA';
      } else if (score >= 80) {
        letra = 'B'; descripcion = 'Muy bien'; claseRes = 'bg-b'; idActivo = 'nB';
      } else if (score >= 70) {
        letra = 'C'; descripcion = 'Bien'; claseRes = 'bg-c'; idActivo = 'nC';
      } else if (score >= 60) {
        letra = 'D'; descripcion = 'Suficiente'; claseRes = 'bg-d'; idActivo = 'nD';
      } else {
        letra = 'F'; descripcion = 'Reprobado'; claseRes = 'bg-f'; idActivo = 'nF';
      }

      letraEl.textContent = letra;
      descEl.textContent = `${score} puntos — ${descripcion}`;
      res.className = 'result ' + claseRes;
      res.style.display = 'block';
      document.getElementById(idActivo).classList.add('activo');
    }

    document.getElementById('score').addEventListener('keydown', e => {
      if (e.key === 'Enter') calificar();
    });
  </script>
</body>
</html>
